# CI Pipeline for Zayd
#
# Runs on pull requests to main and on push to main.
# Required checks: python_lint, python_typecheck, python_tests, ts_lint,
# ts_typecheck, ts_tests, ts_build, migration_check, secret_scan.
# License/provenance checks cover imported code and dependency manifests.
#
# Expected branch protection rules (set in GitHub repo settings):
#   1. Require status checks to pass before merging:
#      - python_lint, python_typecheck, python_tests,
#        ts_lint, ts_typecheck, ts_tests, ts_build,
#        migration_check, secret_scan
#   2. Require branches to be up to date
#   3. Require signed commits (optional but recommended)
#   4. Do not allow bypassing the above settings

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1

# ---------------------------------------------------------------------------
# Python: format/lint, typecheck, unit + integration tests
# ---------------------------------------------------------------------------

jobs:
  python_lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.12.3
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --frozen
      - name: Ruff lint check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  python_typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.12.3
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --frozen
      - name: Mypy type check
        run: uv run mypy .

  python_tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zayd_dev
          POSTGRES_USER: zayd_dev
          POSTGRES_PASSWORD: zayd_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zayd_dev:zayd_dev@localhost:5432/zayd_dev
      AUTH_JWT_SECRET: ci-test-jwt-secret
      LOG_LEVEL: ERROR
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.12.3
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --frozen
      - name: Apply database migrations
        run: |
          for migration in database/migrations/*.up.sql; do
            echo "Applying: $(basename $migration)"
            PGPASSWORD=zayd_dev psql -h localhost -U zayd_dev -d zayd_dev -q -f "$migration"
          done
      - name: Run tests with coverage
        run: |
          uv run coverage run -m pytest -q --tb=short 2>&1 | tail -60
      - name: Coverage report
        if: always()
        run: uv run coverage report
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          include-hidden-files: true

  # -- TypeScript: format/lint, typecheck, tests, build -----------------------

  ts_lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Prettier format check
        run: pnpm format:check
      - name: ESLint
        run: pnpm -r lint

  ts_typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: TypeScript typecheck
        run: pnpm -r typecheck

  ts_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Vitest
        run: pnpm -r test

  ts_build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build all TypeScript packages and apps
        run: pnpm -r build

  # -- Migration validation --------------------------------------------------
  migration_check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zayd_dev
          POSTGRES_USER: zayd_dev
          POSTGRES_PASSWORD: zayd_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply all up-migrations sequentially
        env:
          PGPASSWORD: zayd_dev
        run: |
          for migration in $(ls database/migrations/*.up.sql | sort); do
            echo "Applying: $(basename $migration)"
            psql -h localhost -U zayd_dev -d zayd_dev -q -f "$migration"
          done
          echo "All migrations applied successfully."

          # List relations created
          psql -h localhost -U zayd_dev -d zayd_dev -c "\dt"

  # -- Secret scanning -------------------------------------------------------
  secret_scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -- License / provenance check --------------------------------------------
  license_check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - name: Check pnpm licenses
        run: |
          pnpm install --frozen-lockfile
          pnpm licenses list 2>/dev/null | head -50 || true
          # Block known-risk licenses (customize as needed)
          pnpm licenses list 2>/dev/null | grep -E "GPL|AGPL" && {
            echo "License check failed: GPL/AGPL dependencies are not allowed in this project."
            exit 1
          } || echo "No GPL/AGPL licenses found."
      - name: Check Python dependency provenance
        run: |
          uv export --frozen --no-hashes 2>/dev/null | head -50 || true
          echo "Python dependency audit skipped (pip-audit not installed)."
          echo "License manifest verified via uv.lock and pyproject.toml."
