name: Feature request
description: Propose a product or workflow improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for feature requests only.
        Avoid sensitive information and keep examples sanitized.
  - type: input
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note any security, data, or review impacts.

