name: zayd-self-host

x-runtime-environment: &runtime-environment
  APP_ENV: local
  APP_URL: ${APP_URL:-http://localhost:3100}
  DATABASE_URL: postgresql://${POSTGRES_USER:-zayd}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-zayd}
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-zayd_storage}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  S3_BUCKET: ${S3_BUCKET:-zayd-private}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
  AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?AUTH_SESSION_SECRET is required}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
  LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
  ENABLE_EXTERNAL_PROVIDERS: ${ENABLE_EXTERNAL_PROVIDERS:-false}
  ENABLE_GUEST_MODE: ${ENABLE_GUEST_MODE:-true}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3100}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/postgres/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zayd}
      POSTGRES_USER: ${POSTGRES_USER:-zayd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [data]

  redis:
    image: redis:7.4.2-bookworm
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redis-data:/data
    networks: [data]

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zayd_storage}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - minio-data:/data
    networks: [data]

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zayd_storage}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-zayd-private}
    entrypoint: ["/bin/sh", "/bootstrap/minio-bootstrap.sh"]
    volumes:
      - ../scripts/minio-bootstrap.sh:/bootstrap/minio-bootstrap.sh:ro
    networks: [data]

  ollama:
    image: ollama/ollama:0.11.4
    profiles: ["local-ai"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks: [app]

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment: *runtime-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    networks: [app, data]

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    environment: *runtime-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from zayd_service_worker import get_health; assert get_health().status == 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks: [app, data]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 20
    ports:
      - "${WEB_BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-3100}:3000"
    networks: [app]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  ollama-data:

networks:
  app:
  data:
    internal: true
